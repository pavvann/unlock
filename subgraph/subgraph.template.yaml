specVersion: 1.0.0
description: Unlock Protocol & Associated contracts
features:
  - nonFatalErrors
indexerHints:
  prune: 5000
schema:
  file: ./schema.graphql
dataSources:
{{#deployments}}
  - kind: ethereum
    name: {{ name }}
    network: {{ network }}
    source:
      abi: Unlock
      address: '{{address}}'
      startBlock: {{ startBlock }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - NewLock
      abis:
        - name: Unlock
          file: ./abis/UnlockV11.json
        - name: PublicLock
          file: ./abis/PublicLock.json
        - name: PublicLockV11
          file: ./abis/PublicLockV11.json
        - name: PublicLockV9
          file: ./abis/PublicLockV9.json
      eventHandlers:
        - event: NewLock(indexed address,indexed address)
          handler: handleNewLock
        - event: LockUpgraded(address,uint16)
          handler: handleLockUpgraded
        - event: GNPChanged(uint256,uint256,address,uint256,address)
          handler: handleGNPChanged
      file: ./src/unlock.ts
{{/deployments}}
{{#governance}}
  - kind: ethereum
    name: UPGovernor
    network: {{ network }}
    source:
      abi: UPGovernor
      address: '{{governor.address}}'
      startBlock: {{ governor.startBlock }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
        - DelegateSummary
      abis:
        - name: UPGovernor
          file: ./abis/UPGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: VoteCastWithParams(indexed address,uint256,uint8,uint256,string,bytes)
          handler: handleVoteCastWithParams
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governance.ts
  - kind: ethereum
    name: UPToken
    network: {{ network }}
    source:
      abi: UPToken
      address: '{{token.address}}'
      startBlock: {{ token.startBlock }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Delegate
        - DelegateSummary
      abis:
        - name: UPToken
          file: ./abis/UPToken.json
      eventHandlers:
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
        - event: DelegateVotesChanged(indexed address,uint256,uint256)
          handler: handleDelegateVotesChanged
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleUPTokenTransfer
      file: ./src/governance.ts
{{/governance}}
templates:
  - kind: ethereum
    name: PublicLock
    network: {{ network }}
    source:
      abi: PublicLock
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CancelKey
        - ExpirationChanged
        - ExpireKey
        - KeyExtended
        - KeyManagerChanged
        - LockManagerAdded
        - LockManagerRemoved
        - PricingChanged
        - Transfer
        - ReferrerFee
      abis:
        - name: PublicLock
          file: ./abis/PublicLock.json
        - name: PublicLockV11
          file: ./abis/PublicLockV11.json
        - name: PublicLockV12
          file: ./abis/PublicLockV12.json
        - name: PublicLockV9
          file: ./abis/PublicLockV9.json
      eventHandlers:
        - event: LockConfig(uint256,uint256,uint256)
          handler: handleLockConfig
          receipt: true
        - event: CancelKey(indexed uint256,indexed address,indexed address,uint256)
          handler: handleCancelKey
          receipt: true
        - event: ExpirationChanged(indexed uint256,uint256,bool)
          handler: handleExpirationChangedUntilV11
          receipt: true
        - event: ExpirationChanged(indexed uint256,uint256,uint256)
          handler: handleExpirationChanged
          receipt: true
        - event: ExpireKey(indexed uint256)
          handler: handleExpireKey
          receipt: true
        - event: KeyExtended(indexed uint256,uint256)
          handler: handleKeyExtended
          receipt: true
        - event: KeyManagerChanged(indexed uint256,indexed address)
          handler: handleKeyManagerChanged
          receipt: true
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
          receipt: true
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
          receipt: true
        - event: PricingChanged(uint256,uint256,address,address)
          handler: handlePricingChanged
          receipt: true
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
          receipt: true
        - event: RenewKeyPurchase(indexed address,uint256)
          handler: handleRenewKeyPurchase
          receipt: true
        - event: LockMetadata(string,string,string)
          handler: handleLockMetadata
          receipt: true
        - event: ReferrerFee(indexed address,uint256)
          handler: handleReferrerFees
          receipt: true
        - event: KeyGranterAdded(indexed address)
          handler: handleKeyGranterAdded
          receipt: true
        - event: KeyGranterRemoved(indexed address)
          handler: handleKeyGranterRemoved
          receipt: true
      file: ./src/public-lock.ts
